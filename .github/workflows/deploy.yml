name: Deploy mp3 player API to Azure VM

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Set up SSH key
              run: |
                  mkdir -p ~/.ssh
                  echo "${{ secrets.AZURE_VM_SSH_KEY }}" > ~/.ssh/id_rsa
                  chmod 600 ~/.ssh/id_rsa
                  ssh-keyscan -H ${{ secrets.AZURE_VM_IP }} >> ~/.ssh/known_hosts

            - name: SSH and pull latest code
              run: |
                  ssh ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_IP }} << 'EOF'
                  cd /home/${USER}/mp3-player-api
                  git pull origin main
                  # Or clone if the folder doesn't exist yet
                  EOF

            - name: Install dependencies and restart mp3 player api
              run: |
                  ssh ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_IP }} 'bash ~/mp3-player-api/start.sh'
